<html lang="pt-BR">

    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, interactive-widget=resizes-content" />

    <title>Finanças Pessoais</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <!--
    Script síncrono de tema — deve rodar ANTES de qualquer renderização para
    evitar o flash de tema claro. Lê o localStorage e aplica class="dark" no
    <html> imediatamente, sem esperar o React ou a autenticação resolverem.
    A chave segue o padrão fin_settings_<userId> definido em utils/storage.js.
  -->
  <script>
    (function () {
      try {
        for (var i = 0; i < localStorage.length; i++) {
          var key = localStorage.key(i)
          if (key && key.startsWith('fin_settings_')) {
            var s = JSON.parse(localStorage.getItem(key) || '{}')
            if (s.theme === 'dark') {
              document.documentElement.classList.add('dark')
              break
            }
          }
        }
      } catch (e) {}
    })()
  </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
